<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JIAT-Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center min-h-screen">
  <div class="w-full max-w-xl mt-10 bg-white rounded-lg shadow-lg flex flex-col h-[85vh]">
    <div class="bg-blue-600 text-white text-2xl font-bold p-4 rounded-t-lg flex items-center justify-between">
      <span>JIAT-Chatbot</span>
      <select id="model-select" class="text-black rounded px-2 py-1">
        <!-- Options will be populated by JS -->
      </select>
    </div>
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
    <form id="chat-form" class="flex flex-col gap-2 p-4 border-t">
      <div class="flex gap-2">
        <input id="chat-input" type="text" class="flex-1 border rounded px-3 py-2 focus:outline-none" placeholder="Type your message..." autocomplete="off" required />
        <label class="bg-gray-200 px-3 py-2 rounded cursor-pointer hover:bg-gray-300">
          <input id="image-input" type="file" accept="image/*" multiple class="hidden" />
          📷
        </label>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Send</button>
      </div>
      <div id="image-preview" class="flex gap-2"></div>
    </form>
  </div>
  <!-- API Key Modal -->
  <div id="api-key-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded shadow-lg w-80">
      <h2 class="text-lg font-bold mb-2">Enter OpenRouter API Key</h2>
      <input id="api-key-input" type="password" class="w-full border rounded px-3 py-2 mb-4" placeholder="sk-..." />
      <button id="save-api-key" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Save</button>
    </div>
  </div>
  <script src="jiat-chatbot.js"></script>
</body>
</html>
